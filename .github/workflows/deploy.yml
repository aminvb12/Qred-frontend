name: CI/CD Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  S3_BUCKET: qred-frontend
  STACK_NAME: qred-frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Deploy S3 + CloudFront stack on first run; subsequent runs are no-ops if unchanged
      - name: Deploy frontend infrastructure
        run: |
          aws cloudformation deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --template-file infrastructure/frontend.yml \
            --no-fail-on-empty-changeset \
            --region ${{ env.AWS_REGION }}

      - name: Get CloudFront outputs
        id: cf
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          CF_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomain'].OutputValue" \
            --output text)
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "cf_domain=$CF_DOMAIN" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # API calls go through CloudFront /api/* → ALB — no mixed content
          VITE_API_URL: https://${{ steps.cf.outputs.cf_domain }}/api
        run: npm run build

      - name: Upload to S3
        run: |
          # Upload assets with long cache (hashed filenames)
          aws s3 sync dist/assets s3://${{ env.S3_BUCKET }}/assets \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # Upload index.html with no cache (always fetch latest)
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload everything else
          aws s3 sync dist s3://${{ env.S3_BUCKET }} \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=86400" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cf.outputs.distribution_id }} \
            --paths "/*"
